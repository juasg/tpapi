replicaCount: 2

image:
  repository: <your-registry>/tpapi-frontend
  tag: latest
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  host: tpapi.your-domain.com
  tls:
    enabled: true
    secretName: tpapi-tls

env:
  VITE_IAS_TENANT_URL: "https://<tenant>.accounts.ondemand.com"
  VITE_IAS_CLIENT_ID: "<client-id>"
  VITE_API_BASE_URL: "https://api.tpapi.io/tpapi/v1"
  VITE_APP_BASE_URL: "https://tpapi.your-domain.com"

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "200m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
