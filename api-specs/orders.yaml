openapi: 3.0.3
info:
  title: TPAPI — Order Management
  version: "1.0"
  description: |
    Create and track sales orders. Write operations create records in S/4HANA
    via Integration Suite iFlows. Read operations serve from Snowflake views.

servers:
  - url: https://{apim-host}/tpapi/v1
    variables:
      apim-host:
        default: api.tpapi.io

security:
  - BearerAuth: []
  - ApiKeyAuth: []

paths:
  /orders:
    get:
      summary: List orders
      operationId: listOrders
      tags: [Orders]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, SUBMITTED, CONFIRMED, IN_DELIVERY, DELIVERED, CANCELLED]
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Paginated order list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrders'
        "401":
          $ref: '#/components/responses/Unauthorized'

    post:
      summary: Create order
      operationId: createOrder
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        "201":
          description: Order created in S/4HANA
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /orders/{id}:
    get:
      summary: Get order by ID
      operationId: getOrder
      tags: [Orders]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        "404":
          $ref: '#/components/responses/NotFound'

  /orders/{id}/status:
    get:
      summary: Get order status (from Snowflake)
      operationId: getOrderStatus
      tags: [Orders]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Current order status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderStatus'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  schemas:
    Order:
      type: object
      properties:
        id: { type: string }
        orderNumber: { type: string, example: "ORD-2026-00123" }
        status:
          type: string
          enum: [DRAFT, SUBMITTED, CONFIRMED, IN_DELIVERY, DELIVERED, CANCELLED]
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        customerId: { type: string }
        totalAmount: { type: number, format: double }
        currency: { type: string, example: USD }
        deliveryDate: { type: string, format: date }
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'

    OrderItem:
      type: object
      properties:
        productId: { type: string }
        productName: { type: string }
        quantity: { type: integer }
        unit: { type: string, example: EA }
        unitPrice: { type: number }
        totalPrice: { type: number }

    OrderStatus:
      type: object
      properties:
        id: { type: string }
        status:
          type: string
          enum: [DRAFT, SUBMITTED, CONFIRMED, IN_DELIVERY, DELIVERED, CANCELLED]
        updatedAt: { type: string, format: date-time }

    CreateOrderRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            type: object
            required: [productId, quantity]
            properties:
              productId: { type: string }
              quantity: { type: integer, minimum: 1 }
        deliveryDate: { type: string, format: date }
        notes: { type: string, maxLength: 500 }

    PaginatedOrders:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Order' }
        total: { type: integer }
        page: { type: integer }
        pageSize: { type: integer }

    Error:
      type: object
      properties:
        code: { type: string }
        message: { type: string }

  responses:
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
